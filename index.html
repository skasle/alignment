<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/0 Alignment</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a18;font-size:14px;min-height:100vh}
.wrap{max-width:500px;margin:80px auto;padding:32px;border:1px solid #ddd;border-radius:12px}
h2{font-size:18px;font-weight:600;margin-bottom:8px}
p{font-size:13px;color:#666;margin-bottom:20px;line-height:1.7}
ol{font-size:13px;color:#666;margin-bottom:20px;padding-left:20px;line-height:2.2}
input{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:13px;margin-bottom:12px;font-family:monospace}
input:focus{outline:none;border-color:#185FA5}
button{width:100%;padding:10px;background:#1a1a18;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:inherit}
button:hover{opacity:.85}
button:disabled{opacity:.5;cursor:not-allowed}
.err{font-size:12px;color:#A32D2D;margin-top:8px}
.ok{font-size:12px;color:#3B6D11;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <h2>8/0 Alignment</h2>
  <p>Connect your GitHub account to get started. Your data saves to a private Gist and works on any device.</p>
  <ol>
    <li>Go to <strong>github.com/settings/tokens</strong></li>
    <li>Generate new token (classic)</li>
    <li>Check only the <strong>gist</strong> scope</li>
    <li>Paste token below</li>
  </ol>
  <input type="password" id="tok" placeholder="ghp_..." autocomplete="off">
  <button id="btn">Connect</button>
  <div id="msg"></div>
</div>
<script>
document.getElementById('btn').addEventListener('click', async function() {
  var tok = document.getElementById('tok').value.trim();
  var msg = document.getElementById('msg');
  var btn = document.getElementById('btn');
  if (!tok) { msg.className='err'; msg.textContent='Paste your token first.'; return; }
  btn.textContent = 'Connecting...';
  btn.disabled = true;
  msg.textContent = '';
  try {
    var r = await fetch('https://api.github.com/gists', {
      headers: { 'Authorization': 'token ' + tok, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error('bad token');
    msg.className = 'ok';
    msg.textContent = 'Connected! Token works.';
  } catch(e) {
    msg.className = 'err';
    msg.textContent = 'Could not connect. Make sure the token has the gist scope.';
    btn.textContent = 'Connect';
    btn.disabled = false;
  }
});
document.getElementById('tok').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('btn').click();
});
</script>
</body>
</html>
