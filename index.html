<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8/0 Alignment</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0a0b;
    --surface: #111113;
    --surface2: #18181c;
    --surface3: #1f1f25;
    --border: #2a2a32;
    --border2: #333340;
    --text: #f2f2f8;
    --text2: #bebcd4;
    --text3: #8e8eaa;
    --accent: #6c8cff;
    --accent2: #3d5aff;
    --green: #3ecf8e;
    --amber: #f59e0b;
    --red: #f87171;
    --purple: #a855f7;
    --cyan: #22d3ee;
    --orange: #fb923c;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--text3); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,140,255,0.06); }
  .btn-primary { background: var(--accent2); border-color: var(--accent2); color: #fff; }
  .btn-primary:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── MAIN LAYOUT ─────────────────────────────────── */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
  }

  /* ── EPICS SECTION ───────────────────────────────── */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text3);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .epics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }

  .epic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .epic-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--epic-color, var(--accent));
  }
  .epic-card:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }
  .epic-card.active {
    border-color: var(--epic-color, var(--accent));
    background: var(--surface2);
  }
  .epic-card.active::before {
    width: 3px;
    box-shadow: 0 0 8px var(--epic-color, var(--accent));
  }

  .epic-priority {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 4px;
  }

  .epic-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .epic-nba {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.4;
    margin-bottom: 10px;
  }

  .epic-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .epic-progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-right: 8px;
    overflow: hidden;
  }
  .epic-progress-fill {
    height: 100%;
    background: var(--epic-color, var(--accent));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .epic-pct {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }

  .epic-task-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text3);
    background: var(--surface3);
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 8px;
  }

  /* ── TOOLBAR ──────────────────────────────────────── */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  .filter-input {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    padding: 6px 12px;
    outline: none;
    width: 220px;
    transition: border-color 0.15s;
  }
  .filter-input:focus { border-color: var(--accent); }
  .filter-input::placeholder { color: var(--text3); }

  .filter-chip {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover, .filter-chip.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(108,140,255,0.08);
  }

  .toolbar-spacer { flex: 1; }

  /* ── TASK TABLE ───────────────────────────────────── */
  .tasks-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 32px;
  }

  .tasks-table thead th {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text3);
    font-weight: 500;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    position: sticky;
    top: 53px;
    z-index: 10;
  }
  .tasks-table thead th:hover { color: var(--text2); }
  .tasks-table thead th.sorted { color: var(--accent); }
  .sort-indicator { margin-left: 4px; opacity: 0.6; }

  .tasks-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  .tasks-table tbody tr:hover { background: var(--surface2); }
  .tasks-table tbody tr.selected { background: rgba(108,140,255,0.06); }

  .tasks-table td {
    padding: 10px 12px;
    vertical-align: middle;
    color: var(--text2);
    font-size: 12px;
  }

  .td-priority { font-family: var(--mono); font-size: 11px; color: var(--text3); width: 48px; text-align: center; }
  .td-task { color: var(--text); font-weight: 500; min-width: 200px; }
  .td-task .task-notes { font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }

  .epic-pill { display: inline-block; font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; border: 1px solid; white-space: nowrap; max-width: 180px; overflow: hidden; text-overflow: ellipsis; }

  .owner-badge { font-family: var(--mono); font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 3px; background: var(--surface3); color: var(--text2); white-space: nowrap; }
  .owner-SK   { color: var(--accent); background: rgba(108,140,255,0.1); }
  .owner-JP   { color: var(--cyan);   background: rgba(34,211,238,0.1);  }
  .owner-SKJP { color: var(--purple); background: rgba(168,85,247,0.1);  }
  .owner-Yan  { color: var(--orange); background: rgba(251,146,60,0.1);  }

  .status-badge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; white-space: nowrap; }
  .status-started     { color: var(--green); background: rgba(62,207,142,0.1);  }
  .status-not-started { color: var(--text3); background: var(--surface3);       }
  .status-pct         { color: var(--amber); background: rgba(245,158,11,0.1);  }
  .status-blocked     { color: var(--red);   background: rgba(248,113,113,0.1); }
  .status-done        { color: var(--text3); background: var(--surface3); text-decoration: line-through; }

  .score-chip { font-family: var(--mono); font-size: 11px; font-weight: 500; width: 28px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; margin: 0 auto; }
  .score-1    { background: rgba(62,207,142,0.15); color: var(--green); }
  .score-2    { background: rgba(62,207,142,0.1);  color: var(--green); opacity: 0.8; }
  .score-3    { background: rgba(245,158,11,0.1);  color: var(--amber); }
  .score-4    { background: rgba(245,158,11,0.12); color: var(--amber); opacity: 0.8; }
  .score-6    { background: rgba(248,113,113,0.08); color: var(--red);  opacity: 0.7; }
  .score-high { background: rgba(248,113,113,0.1);  color: var(--red);  }

  .td-eta { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
  .td-eta.overdue { color: var(--red); }
  .td-eta.soon    { color: var(--amber); }
  .td-num { font-family: var(--mono); font-size: 11px; color: var(--text3); text-align: center; width: 40px; }

  /* ── EDIT MODAL ───────────────────────────────────── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); z-index: 200; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 8px; width: 560px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--text); text-transform: uppercase; letter-spacing: 0.08em; }
  .modal-close { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 3px; transition: color 0.15s; }
  .modal-close:hover { color: var(--text); }
  .modal-body { padding: 20px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field-row.single { grid-template-columns: 1fr; }
  .field-row.triple { grid-template-columns: 1fr 1fr 1fr; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); font-weight: 500; }
  .field input, .field select, .field textarea { font-family: var(--mono); font-size: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 7px 10px; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--surface2); }
  .field textarea { resize: vertical; min-height: 60px; font-family: var(--sans); font-size: 12px; }
  .modal-footer { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-top: 1px solid var(--border); gap: 8px; }
  .btn-danger { font-family: var(--mono); font-size: 11px; font-weight: 500; padding: 6px 14px; border-radius: 4px; border: 1px solid rgba(248,113,113,0.3); background: rgba(248,113,113,0.08); color: var(--red); cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.04em; }
  .btn-danger:hover { background: rgba(248,113,113,0.15); border-color: var(--red); }

  /* ── COMPLETED SECTION ───────────────────────────── */
  .completed-toggle { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 12px; user-select: none; }
  .completed-toggle:hover { color: var(--text2); }
  .completed-table { display: none; margin-bottom: 32px; }
  .completed-table.open { display: block; }

  /* ── STATS BAR ────────────────────────────────────── */
  .stats-bar { display: flex; gap: 20px; padding: 12px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; gap: 2px; }
  .stat-value { font-family: var(--mono); font-size: 18px; font-weight: 500; color: var(--text); line-height: 1; }
  .stat-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); }
  .stat-divider { width: 1px; background: var(--border); align-self: stretch; }

  /* ── FAB ─────────────────────────────────────────── */
  .fab { position: fixed; bottom: 28px; right: 28px; width: 44px; height: 44px; border-radius: 50%; background: var(--accent2); border: none; color: #fff; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(61,90,255,0.4); transition: all 0.2s; z-index: 50; }
  .fab:hover { background: var(--accent); box-shadow: 0 6px 28px rgba(108,140,255,0.5); transform: scale(1.06); }

  .task-url-link { color: var(--accent); text-decoration: none; font-family: var(--mono); font-size: 10px; }
  .task-url-link:hover { text-decoration: underline; }

  /* ── TOAST ────────────────────────────────────────── */
  .toast { position: fixed; bottom: 80px; right: 28px; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 10px 16px; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 300; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── RESPONSIVE ───────────────────────────────────── */
  @media (max-width: 900px) { .hide-sm { display: none; } main { padding: 16px; } .epics-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 600px) { .epics-grid { grid-template-columns: 1fr; } }

  .tasks-table tbody tr.critical-path { border-left: 2px solid var(--accent); background: rgba(108,140,255,0.04); }
  .tasks-table tbody tr.critical-path:hover { background: rgba(108,140,255,0.09); }
  .tasks-table tbody tr.critical-path .td-priority { color: var(--accent); font-weight: 500; }
  .drag-hint { font-family: var(--mono); font-size: 10px; color: var(--text3); padding: 4px 0; }
  input[type="file"] { display: none; }
  .score-calc { font-family: var(--mono); font-size: 11px; color: var(--accent); padding: 6px 10px; background: rgba(108,140,255,0.06); border-radius: 4px; border: 1px solid rgba(108,140,255,0.15); text-align: center; }

  /* ── SAVE INDICATOR ──────────────────────────────── */
  .save-indicator { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.05em; }
</style>
</head>
<body>

<header>
  <div class="logo">8<span>/</span>0 <span style="color:var(--text3);font-size:11px;margin-left:6px;">ALIGNMENT</span></div>
  <div class="header-right">
    <span class="save-indicator" id="saveIndicator"></span>
    <input type="file" id="csvImport" accept=".csv">
    <button class="btn" onclick="resetToDefaults()">Reset</button>
    <button class="btn" onclick="document.getElementById('csvImport').click()">Import CSV</button>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn btn-primary" onclick="openAddTask()">+ Task</button>
  </div>
</header>

<main>
  <div class="stats-bar" id="statsBar"></div>
  <div class="section-label">Epics</div>
  <div class="epics-grid" id="epicsGrid"></div>
  <div class="section-label">Active Tasks</div>
  <div class="toolbar">
    <input class="filter-input" id="searchInput" placeholder="Filter tasks..." oninput="renderTasks()">
    <div class="filter-chip active" data-owner="all"   onclick="setOwnerFilter('all',this)">All</div>
    <div class="filter-chip"        data-owner="SK"    onclick="setOwnerFilter('SK',this)">SK</div>
    <div class="filter-chip"        data-owner="JP"    onclick="setOwnerFilter('JP',this)">JP</div>
    <div class="filter-chip"        data-owner="Yan"   onclick="setOwnerFilter('Yan',this)">Yan</div>
    <div class="filter-chip"        data-owner="SK/JP" onclick="setOwnerFilter('SK/JP',this)">Shared</div>
    <div class="toolbar-spacer"></div>
    <span class="drag-hint" id="taskCount"></span>
  </div>
  <table class="tasks-table" id="tasksTable">
    <thead>
      <tr>
        <th onclick="sortBy('priority')" class="sorted">PRI <span class="sort-indicator" id="sort-priority">↑</span></th>
        <th onclick="sortBy('task')">TASK <span class="sort-indicator" id="sort-task"></span></th>
        <th onclick="sortBy('epic')" class="hide-sm">EPIC <span class="sort-indicator" id="sort-epic"></span></th>
        <th onclick="sortBy('owner')">OWN <span class="sort-indicator" id="sort-owner"></span></th>
        <th onclick="sortBy('status')">STATUS <span class="sort-indicator" id="sort-status"></span></th>
        <th onclick="sortBy('eta')" class="hide-sm">ETA <span class="sort-indicator" id="sort-eta"></span></th>
        <th onclick="sortBy('score')" class="hide-sm">SCR <span class="sort-indicator" id="sort-score"></span></th>
        <th onclick="sortBy('scope')" class="hide-sm">SC <span class="sort-indicator" id="sort-scope"></span></th>
        <th onclick="sortBy('impact')" class="hide-sm">IM <span class="sort-indicator" id="sort-impact"></span></th>
      </tr>
    </thead>
    <tbody id="tasksBody"></tbody>
  </table>
  <div class="completed-toggle" onclick="toggleCompleted()">
    <span id="completedArrow">▶</span>
    <span>Completed</span>
    <span id="completedCount" style="color:var(--text3);"></span>
    <span style="flex:1;height:1px;background:var(--border);margin-left:8px;"></span>
  </div>
  <div class="completed-table" id="completedSection">
    <table class="tasks-table">
      <thead>
        <tr>
          <th>TASK</th>
          <th>EPIC</th>
          <th>OWNER</th>
          <th class="hide-sm">SC</th>
          <th class="hide-sm">IM</th>
          <th class="hide-sm">SCORE</th>
          <th class="hide-sm">NOTES</th>
        </tr>
      </thead>
      <tbody id="completedBody"></tbody>
    </table>
  </div>
</main>

<button class="fab" onclick="openAddTask()">+</button>
<div class="toast" id="toast"></div>

<!-- Edit/Add Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBackdrop(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Edit Task</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editIndex">
      <div class="field-row single"><div class="field"><label>Task Name</label><input type="text" id="fTask" placeholder="Describe the task..."></div></div>
      <div class="field-row">
        <div class="field"><label>Epic</label><select id="fEpic"></select></div>
        <div class="field"><label>Owner</label><select id="fOwner"><option value="SK">SK</option><option value="JP">JP</option><option value="Yan">Yan</option><option value="SK/JP">SK/JP</option><option value="Sam">Sam</option></select></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Status</label><select id="fStatus"><option value="Not Started">Not Started</option><option value="Started">Started</option><option value="In Progress">In Progress</option><option value="Blocked">Blocked</option><option value="25%">25%</option><option value="50%">50%</option><option value="75%">75%</option><option value="90%">90%</option><option value="Done">Done</option></select></div>
        <div class="field"><label>ETA</label><input type="text" id="fETA" placeholder="e.g. 3/31/2026"></div>
      </div>
      <div class="field-row triple">
        <div class="field"><label>Scope (1–5)</label><select id="fScope" onchange="calcScore()"><option value="">—</option><option value="1">1 · ≤3 days</option><option value="2">2 · 4-7 days</option><option value="3">3 · 1-2 wks</option><option value="4">4 · 3-4 wks</option><option value="5">5 · 4+ wks</option></select></div>
        <div class="field"><label>Impact (1–5)</label><select id="fImpact" onchange="calcScore()"><option value="">—</option><option value="1">1 · 10%+ rev</option><option value="2">2 · 6-9% rev</option><option value="3">3 · 3-5% rev</option><option value="4">4 · 1-2% rev</option><option value="5">5 · minimal</option></select></div>
        <div class="field"><label>Score</label><div class="score-calc" id="scoreCalc">—</div></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Priority</label><input type="number" id="fPriority" placeholder="e.g. 1" step="0.25"></div>
        <div class="field"><label>URL</label><input type="text" id="fURL" placeholder="https://..."></div>
      </div>

// ─── PERSISTENCE (PATCH: localStorage) ───────────────────────
const STORAGE_KEY = '8by0_alignment_state';

function saveState() {
  try {
    const data = {
      epics: STATE.epics,
      tasks: STATE.tasks,
      completed: STATE.completed,
      _saved: new Date().toISOString(),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    const el = document.getElementById('saveIndicator');
    if (el) el.textContent = 'saved ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    console.warn('Failed to save state:', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const data = JSON.parse(raw);
      if (data.epics && data.epics.length) STATE.epics = data.epics;
      if (data.tasks)                      STATE.tasks = data.tasks;
      if (data.completed)                  STATE.completed = data.completed;
      console.log('Loaded saved state from', data._saved || 'unknown');
      return true;
    }
  } catch (e) {
    console.warn('Failed to load state:', e);
  }
  return false;
}

function resetToDefaults() {
  if (!confirm('Reset all data to defaults? This will discard all changes since last code deploy.')) return;
  localStorage.removeItem(STORAGE_KEY);
  loadDefaults();
  renderAll();
  showToast('Reset to defaults');
}

// ─── EPIC COLORS ─────────────────────────────────────────────
function epicColor(epicTitle) {
  const idx = STATE.epics.findIndex(e => e.title === epicTitle);
  return EPIC_COLORS[idx % EPIC_COLORS.length] || '#6c8cff';
}
function epicColorByIndex(i) { return EPIC_COLORS[i % EPIC_COLORS.length]; }

// ─── RENDER EPICS ────────────────────────────────────────────
function renderEpics() {
  const grid = document.getElementById('epicsGrid');
  grid.innerHTML = '';
  STATE.epics.forEach((epic, i) => {
    const color = epicColorByIndex(i);
    const taskCount = STATE.tasks.filter(t => t.epic === epic.title).length;
    const pctNum = parseInt(epic.pct) || 0;
    const isActive = STATE.epicFilter === epic.title;
    const card = document.createElement('div');
    card.className = 'epic-card' + (isActive ? ' active' : '');
    card.style.setProperty('--epic-color', color);
    card.onclick = () => { STATE.epicFilter = isActive ? null : epic.title; renderEpics(); renderTasks(); };
    card.innerHTML = `
      <div class="epic-priority">${escHtml(epic.priority)}</div>
      <div class="epic-title">${escHtml(epic.title)}</div>
      <div class="epic-nba">${escHtml(epic.nba)}</div>
      <div class="epic-footer">
        <div class="epic-progress-bar"><div class="epic-progress-fill" style="width:${pctNum}%"></div></div>
        <span class="epic-pct">${epic.pct}</span>
        <span class="epic-task-count">${taskCount}t</span>
      </div>`;
    grid.appendChild(card);
  });
}

// ─── RENDER TASKS ────────────────────────────────────────────
function renderTasks() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const now = new Date();
  let filtered = STATE.tasks.filter(t => {
    if (STATE.ownerFilter !== 'all' && t.owner !== STATE.ownerFilter) return false;
    if (STATE.epicFilter && t.epic !== STATE.epicFilter) return false;
    if (search) {
      const haystack = [t.task, t.epic, t.owner, t.status, t.notes].join(' ').toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  filtered = filtered.slice().sort((a, b) => {
    const aPri = a.priority === '' || a.priority == null ? 999 : parseFloat(a.priority);
    const bPri = b.priority === '' || b.priority == null ? 999 : parseFloat(b.priority);
    if (aPri === 0 && bPri !== 0) return -1;
    if (aPri !== 0 && bPri === 0) return 1;
    let av = a[STATE.sortKey], bv = b[STATE.sortKey];
    if (['priority','score','scope','impact'].includes(STATE.sortKey)) {
      av = parseFloat(av) || 999; bv = parseFloat(bv) || 999;
    } else if (STATE.sortKey === 'eta') {
      av = av ? new Date(av) : new Date('9999'); bv = bv ? new Date(bv) : new Date('9999');
    } else { av = (av || '').toLowerCase(); bv = (bv || '').toLowerCase(); }
    if (av < bv) return STATE.sortDir === 'asc' ? -1 : 1;
    if (av > bv) return STATE.sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  document.getElementById('taskCount').textContent = `${filtered.length} task${filtered.length !== 1 ? 's' : ''}`;
  const tbody = document.getElementById('tasksBody');
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center;padding:48px;color:var(--text3);font-family:var(--mono);font-size:12px;">No tasks match filters</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(t => {
    const idx = STATE.tasks.indexOf(t);
    const color = epicColor(t.epic);
    const ownerClass = t.owner === 'SK' ? 'owner-SK' : t.owner === 'JP' ? 'owner-JP' : t.owner === 'SK/JP' ? 'owner-SKJP' : t.owner === 'Yan' ? 'owner-Yan' : '';
    const statusClass = getStatusClass(t.status);
    const scoreVal = parseInt(t.score) || 0;
    const scoreClass = scoreVal <= 2 ? 'score-1' : scoreVal <= 3 ? 'score-2' : scoreVal <= 4 ? 'score-3' : 'score-high';
    let etaClass = '';
    if (t.eta) { const etaDate = new Date(t.eta); const diff = (etaDate - now) / (1000*60*60*24); if (diff < 0) etaClass = 'overdue'; else if (diff <= 7) etaClass = 'soon'; }
    const isCritical = parseFloat(t.priority) === 0 && t.priority !== '';
    return `<tr onclick="openEditTask(${idx})" class="${isCritical ? 'critical-path' : ''}">
      <td class="td-priority">${t.priority === '99' ? '—' : t.priority}</td>
      <td class="td-task">${escHtml(t.task)}${t.notes ? `<div class="task-notes">${escHtml(t.notes)}</div>` : ''}</td>
      <td class="hide-sm"><span class="epic-pill" style="color:${color};border-color:${color}30;background:${color}10">${escHtml(shortEpic(t.epic))}</span></td>
      <td><span class="owner-badge ${ownerClass}">${escHtml(t.owner)}</span></td>
      <td><span class="status-badge ${statusClass}">${escHtml(t.status)}</span></td>
      <td class="td-eta ${etaClass} hide-sm">${t.eta || '—'}</td>
      <td class="hide-sm"><div class="score-chip ${scoreClass}">${t.score || '—'}</div></td>
      <td class="td-num hide-sm">${t.scope || '—'}</td>
      <td class="td-num hide-sm">${t.impact || '—'}</td></tr>`;
  }).join('');
}

function shortEpic(title) {
  const map = { 'Close Seed Round':'Close Seed', 'Generate Revenue vs. Goal':'Revenue', 'Right-Sized Tech Team Build':'Tech Team', 'Customer Onboarding & Support':'Onboarding', 'Carrier Pipeline Engagement':'Carriers', 'AI Foundation':'AI' };
  return map[title] || title;
}
function getStatusClass(s) {
  if (!s) return 'status-not-started';
  const sl = s.toLowerCase();
  if (sl === 'started' || sl === 'in progress') return 'status-started';
  if (sl === 'not started') return 'status-not-started';
  if (sl === 'blocked') return 'status-blocked';
  if (sl === 'done') return 'status-done';
  if (sl.includes('%')) return 'status-pct';
  return 'status-not-started';
}

function sortBy(key) {
  if (STATE.sortKey === key) { STATE.sortDir = STATE.sortDir === 'asc' ? 'desc' : 'asc'; }
  else { STATE.sortKey = key; STATE.sortDir = 'asc'; }
  SORT_KEYS.forEach(k => { const el = document.getElementById(`sort-${k}`); if (el) el.textContent = ''; });
  const el = document.getElementById(`sort-${key}`);
  if (el) el.textContent = STATE.sortDir === 'asc' ? '↑' : '↓';
  renderTasks();
}

// ─── FILTERS ─────────────────────────────────────────────────
function setOwnerFilter(owner, el) {
  STATE.ownerFilter = owner;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderTasks();
}

// ─── MODAL ───────────────────────────────────────────────────
function populateEpicSelect(selected) {
  const sel = document.getElementById('fEpic');
  sel.innerHTML = STATE.epics.map(e => `<option value="${escHtml(e.title)}" ${e.title === selected ? 'selected' : ''}>${escHtml(e.title)}</option>`).join('');
}
function openAddTask() {
  document.getElementById('modalTitle').textContent = 'New Task';
  document.getElementById('editIndex').value = '-1';
  document.getElementById('fTask').value = '';
  document.getElementById('fETA').value = '';
  document.getElementById('fPriority').value = '1';
  document.getElementById('fURL').value = '';
  document.getElementById('fNotes').value = '';
  document.getElementById('fStatus').value = 'Not Started';
  document.getElementById('fScope').value = '';
  document.getElementById('fImpact').value = '';
  document.getElementById('fOwner').value = 'SK';
  document.getElementById('scoreCalc').textContent = '—';
  document.getElementById('completeBtn').style.display = 'none';
  populateEpicSelect(STATE.epicFilter || (STATE.epics[0] ? STATE.epics[0].title : ''));
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('fTask').focus(), 50);
}
function openEditTask(idx) {
  const t = STATE.tasks[idx]; if (!t) return;
  document.getElementById('modalTitle').textContent = 'Edit Task';
  document.getElementById('editIndex').value = idx;
  document.getElementById('fTask').value = t.task;
  document.getElementById('fETA').value = t.eta;
  document.getElementById('fPriority').value = t.priority;
  document.getElementById('fURL').value = t.url;
  document.getElementById('fNotes').value = t.notes;
  document.getElementById('fStatus').value = t.status;
  document.getElementById('fScope').value = t.scope;
  document.getElementById('fImpact').value = t.impact;
  document.getElementById('fOwner').value = t.owner;
  populateEpicSelect(t.epic);
  calcScore();
  document.getElementById('completeBtn').style.display = 'block';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeModalOnBackdrop(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
function calcScore() {
  const s = parseInt(document.getElementById('fScope').value) || 0;
  const im = parseInt(document.getElementById('fImpact').value) || 0;
  document.getElementById('scoreCalc').textContent = (s && im) ? `${s} × ${im} = ${s * im}` : '—';
}
function saveTask() {
  const idx = parseInt(document.getElementById('editIndex').value);
  const scope = document.getElementById('fScope').value;
  const impact = document.getElementById('fImpact').value;
  const score = (scope && impact) ? String(parseInt(scope) * parseInt(impact)) : '';
  const t = {
    priority: document.getElementById('fPriority').value || '1',
    task: document.getElementById('fTask').value.trim(),
    epic: document.getElementById('fEpic').value,
    owner: document.getElementById('fOwner').value,
    status: document.getElementById('fStatus').value,
    eta: document.getElementById('fETA').value.trim(),
    scope, impact, score,
    url: document.getElementById('fURL').value.trim(),
    notes: document.getElementById('fNotes').value.trim(),
  };
  if (!t.task) { showToast('Task name required'); return; }
  if (idx === -1) { STATE.tasks.push(t); showToast('Task added'); }
  else { STATE.tasks[idx] = t; showToast('Task saved'); }
  closeModal(); renderAll();
}
function markComplete() {
  const idx = parseInt(document.getElementById('editIndex').value);
  if (idx < 0) return;
  const t = STATE.tasks[idx];
  STATE.completed.unshift({ task: t.task, epic: t.epic, owner: t.owner, scope: t.scope, impact: t.impact, score: t.score, url: t.url, notes: t.notes });
  STATE.tasks.splice(idx, 1);
  closeModal(); showToast('Moved to Completed'); renderAll();
}

// ─── CSV EXPORT ──────────────────────────────────────────────
function exportCSV() {
  let csv = 'EPICS\r\nPriority,Title,Next Best Action,Progress %\r\n';
  STATE.epics.forEach(e => { csv += `${csvCell(e.priority)},${csvCell(e.title)},${csvCell(e.nba)},${csvCell(e.pct)}\r\n`; });
  csv += '\r\nACTIVE TASKS\r\nPriority,Task,Epic,Owner,Status,ETA,Scope,Impact,Score,URL,Notes\r\n';
  STATE.tasks.forEach(t => { csv += `${csvCell(t.priority)},${csvCell(t.task)},${csvCell(t.epic)},${csvCell(t.owner)},${csvCell(t.status)},${csvCell(t.eta)},${csvCell(t.scope)},${csvCell(t.impact)},${csvCell(t.score)},${csvCell(t.url)},${csvCell(t.notes)}\r\n`; });
  csv += '\r\nCOMPLETED\r\nTask,Epic,Owner,Scope,Impact,Score,URL,Notes\r\n';
  STATE.completed.forEach(t => { csv += `${csvCell(t.task)},${csvCell(t.epic)},${csvCell(t.owner)},${csvCell(t.scope)},${csvCell(t.impact)},${csvCell(t.score)},${csvCell(t.url)},${csvCell(t.notes)}\r\n`; });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `8by0-alignment-${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV exported');
}
function csvCell(v) { v = String(v == null ? '' : v); if (v.includes(',') || v.includes('"') || v.includes('\n')) return '"' + v.replace(/"/g, '""') + '"'; return v; }

// ─── CSV IMPORT ──────────────────────────────────────────────
document.getElementById('csvImport').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try { parseCSV(ev.target.result); renderAll(); showToast('CSV imported — ' + STATE.tasks.length + ' tasks loaded'); }
    catch(err) { showToast('Import error: ' + err.message); }
  };
  reader.readAsText(file);
  this.value = '';
});

function parseCSV(text) {
  const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  let section = null;
  const newEpics = [], newTasks = [], newCompleted = [];
  lines.forEach(line => {
    const trimmed = line.trim();
    if (trimmed === 'EPICS')        { section = 'epics';     return; }
    if (trimmed === 'ACTIVE TASKS') { section = 'tasks';     return; }
    if (trimmed === 'COMPLETED')    { section = 'completed'; return; }
    if (!trimmed) return;
    const cells = parseCSVRow(trimmed);
    if (!cells || cells.length < 2) return;
    if (section === 'epics') {
      if (cells[0] === 'Priority') return;
      if (cells[0] && cells[1] && cells[1] !== 'Title') newEpics.push({ priority: cells[0], title: cells[1], nba: cells[2] || '', pct: cells[3] || '0%' });
    } else if (section === 'tasks') {
      if (cells[0] === 'Priority') return;
      if (cells[1] && cells[1] !== 'Task') newTasks.push({ priority: cells[0] || '1', task: cells[1], epic: cells[2] || '', owner: cells[3] || 'SK', status: cells[4] || 'Not Started', eta: cells[5] || '', scope: cells[6] || '', impact: cells[7] || '', score: cells[8] || '', url: cells[9] || '', notes: cells[10] || '' });
    } else if (section === 'completed') {
      if (cells[0] === 'Task') return;
      if (cells[0]) newCompleted.push({ task: cells[0], epic: cells[1] || '', owner: cells[2] || '', scope: cells[3] || '', impact: cells[4] || '', score: cells[5] || '', url: cells[6] || '', notes: cells[7] || '' });
    }
  });
  if (newEpics.length)     STATE.epics     = newEpics;
  if (newTasks.length)     STATE.tasks     = newTasks;
  if (newCompleted.length) STATE.completed = newCompleted;
}

function parseCSVRow(line) {
  const result = []; let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { if (inQuote && line[i+1] === '"') { cur += '"'; i++; } else inQuote = !inQuote; }
    else if (c === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

// ─── UTILS ───────────────────────────────────────────────────
function escHtml(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function today() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

// ─── RENDER ALL (with persistence) ──────────────────────────
function renderAll() {
  renderStats();
  renderEpics();
  renderTasks();
  renderCompleted();
  saveState();  // ← PATCH: persist to localStorage after every change
}

// ─── INIT ────────────────────────────────────────────────────
loadDefaults();          // set baseline structure
loadState();             // override with saved data if any exist
renderAll();
document.getElementById('sort-priority').textContent = '↑';

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); openAddTask(); }
});
</script>
